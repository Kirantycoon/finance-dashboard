<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Finance Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: var(--bg-main); font-family: 'Inter', sans-serif; padding: 2rem 0; box-sizing: border-box; }
        .auth-container { width: 100%; max-width: 440px; padding: 2.5rem; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--card-border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-header h1 { margin: 0 0 0.5rem 0; font-size: 1.8rem; color: var(--text-main); }
        .auth-header p { margin: 0; color: var(--text-muted); font-size: 0.95rem; }
        .auth-form { display: flex; flex-direction: column; gap: 1.25rem; }
        .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .input-group label { font-size: 0.85rem; font-weight: 500; color: var(--text-main); }
        .input-group input { padding: 0.8rem 1rem; border-radius: 8px; border: 1px solid var(--card-border); background: var(--bg-main); color: var(--text-main); font-family: inherit; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        .input-group input:focus { border-color: var(--color-accent); }
        .auth-btn { background: var(--color-accent); color: white; border: none; padding: 0.9rem; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: opacity 0.2s; margin-top: 0.5rem; }
        .auth-btn:hover { opacity: 0.9; }
        .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted); }
        .auth-footer a { color: var(--color-accent); text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .auth-footer a:hover { color: #a78bfa; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div style="width: 48px; height: 48px; background: var(--color-accent); border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 1rem;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><line x1="19" y1="8" x2="19" y2="14"></line><line x1="22" y1="11" x2="16" y2="11"></line></svg>
            </div>
            <h1>Create Account</h1>
            <p>Start tracking your financial health today.</p>
        </div>
        
        <!-- Action set to mimic jumping into the dashboard after account creation -->
        <form class="auth-form" action="index.html" onsubmit="event.preventDefault(); window.location.href='index.html';">
            <div class="name-row">
                <div class="input-group">
                    <label for="fname">First Name</label>
                    <input type="text" id="fname" placeholder="Kiran" required>
                </div>
                <div class="input-group">
                    <label for="lname">Last Name</label>
                    <input type="text" id="lname" placeholder="Tycoon" required>
                </div>
            </div>
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="kiran@example.com" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <div class="input-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="••••••••" required>
            </div>
            
            <label style="display: flex; align-items: flex-start; gap: 0.5rem; font-size: 0.85rem; color: var(--text-muted); cursor: pointer; margin-top: 0.25rem;">
                <input type="checkbox" required style="accent-color: var(--color-accent); margin-top: 0.15rem;"> 
                <span>I agree to the <a href="#" style="color: var(--color-accent); text-decoration: none;">Terms of Service</a> and <a href="#" style="color: var(--color-accent); text-decoration: none;">Privacy Policy</a>.</span>
            </label>
            
            <button type="submit" class="auth-btn">Create Account</button>
        </form>
        
        <div class="auth-footer">
            Already have an account? <a href="login.html">Sign in</a>
        </div>
    </div>
</body>
</html>
